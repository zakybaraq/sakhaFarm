version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sakhafarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sakhafarm
      MYSQL_DATABASE: sakhafarm_latest
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sakhafarm-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
